spring:
  application:
    name: bucketeer
  messages:
    basename: messages
    encoding: UTF-8

server:
  port: 8080

bucketeer:
  servers:
    - name: "Local Minio"
      endpoint: http://localhost:9000
      region: us-east-1
      access-key: ${S3_ACCESS_KEY:admin}
      secret-key: ${S3_SECRET_KEY:admin123}
