help.backToSearch=← Suche
help.section.syntax=Template-Syntax
help.section.functions=Funktionsreferenz
help.syntax.intro=Ein Präfix-Template ist ein Pfad, bei dem Segmente (getrennt durch /) Funktions-Platzhalter enthalten können. Platzhalter werden vor der S3-Abfrage aufgelöst.
help.syntax.segments=Segmente
help.syntax.segments.literal=Ein <strong>Literal</strong>-Segment wird unverändert verwendet: <code>myprefix</code>, <code>2024</code>
help.syntax.segments.placeholder=Ein <strong>Platzhalter</strong> wird in <code>{ }</code> eingeschlossen: <code>{everyNth(key, 0, 2)}</code>
help.syntax.segments.escape=<code>\{</code> fügt ein literales <code>{</code> in den Pfad ein
help.syntax.references=Referenzen
help.syntax.references.intro=Das erste Argument eines Funktionsaufrufs ist eine Referenz:
help.syntax.ref.reference=Referenz
help.syntax.ref.meaning=Bedeutung
help.syntax.ref.key=Der vom Benutzer eingegebene Schlüssel
help.syntax.ref.pN=Der Wert von Segment N im Template (1-basiert)
help.syntax.pN.rules=<strong>Regeln für pN:</strong> Eine Referenz auf ein <em>Literal</em>-Segment ist immer erlaubt. Eine Referenz auf ein <em>Funktions</em>-Segment erfordert N &lt; aktuelle Position.
help.syntax.chaining=Funktionsverkettung
help.syntax.chaining.intro=Funktionen können verschachtelt werden. Die innere Funktion wird zuerst aufgelöst und ihr Ergebnis der äußeren übergeben:
help.syntax.wildcard=Wildcard
help.syntax.wildcard.desc=Ein <code>*</code> am Ende des <strong>Schlüssel</strong>-Feldes führt eine Präfix-Suche durch. Nur abschließende Wildcards werden unterstützt.

