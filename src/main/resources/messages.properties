nav.help=Help

help.title=Bucketeer – Help
help.section.syntax=Template Syntax
help.section.functions=Function Reference
help.syntax.intro=A prefix template is a path where segments (separated by /) can contain function placeholders. Placeholders are resolved before the S3 query is executed.
help.syntax.segments=Segments
help.syntax.segments.literal=A <strong>literal</strong> segment is used as-is: <code>myprefix</code>, <code>2024</code>
help.syntax.segments.placeholder=A <strong>placeholder</strong> is wrapped in <code>{ }</code>: <code>{everyNth(key, 0, 2)}</code>
help.syntax.segments.escape=Use <code>\{</code> to include a literal <code>{</code> in the path
help.syntax.references=References
help.syntax.references.intro=Inside a function call, the first argument is a reference:
help.syntax.ref.reference=Reference
help.syntax.ref.meaning=Meaning
help.syntax.ref.key=The key value entered by the user
help.syntax.ref.pN=The value of segment N in the template (1-based)
help.syntax.pN.rules=<strong>Rules for pN:</strong> A reference to a <em>literal</em> segment is always allowed. A reference to a <em>function</em> segment requires N &lt; current position.
help.syntax.chaining=Function Chaining
help.syntax.chaining.intro=Functions can be nested. The inner function is resolved first and its result is passed to the outer:
help.syntax.wildcard=Wildcard
help.syntax.wildcard.desc=A <code>*</code> at the end of the <strong>Key</strong> field performs a prefix search. Only trailing wildcards are supported.

