<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<!--
  Shared layout fragments used by all pages.
  Usage:
    <link th:replace="~{layout :: styles}"/>
    <nav th:replace="~{layout :: header}"></nav>
    <footer th:replace="~{layout :: footer}"></footer>
-->

<!-- Styles fragment - include in <head> -->
<th:block th:fragment="styles">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/bucketeer.css}"/>
    <script th:inline="javascript">
        (function() {
            var saved = localStorage.getItem('bs-theme');
            if (saved === 'dark' || saved === 'light') {
                document.documentElement.setAttribute('data-bs-theme', saved);
            }
        })();
        function toggleTheme() {
            var current = document.documentElement.getAttribute('data-bs-theme');
            var next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-bs-theme', next);
            localStorage.setItem('bs-theme', next);
            updateThemeIcon(next);
        }
        function updateThemeIcon(theme) {
            var icon = document.getElementById('themeIcon');
            if (!icon) return;
            icon.className = theme === 'dark' ? 'bi bi-sun' : 'bi bi-moon-stars';
        }
        document.addEventListener('DOMContentLoaded', function() {
            var current = document.documentElement.getAttribute('data-bs-theme') || 'light';
            updateThemeIcon(current);
        });
    </script>
</th:block>

<!-- Header fragment -->
<nav th:fragment="header" class="navbar navbar-dark bg-dark mb-3 border-bottom border-secondary">
    <div class="container-fluid">
        <!-- Left: app name -->
        <a class="navbar-brand fw-bold" href="/" th:text="#{app.title}">Bucketeer</a>

        <!-- Center: server selector -->
        <form method="post" action="/session/server"
              class="d-flex align-items-center gap-2 mx-auto">
            <label class="text-secondary small" th:text="#{label.server}">Server</label>
            <select name="serverName" class="form-select form-select-sm w-auto"
                    onchange="this.form.submit()"
                    th:if="${serverNames != null and !serverNames.isEmpty()}">
                <option th:each="s : ${serverNames}"
                        th:value="${s}"
                        th:text="${s}"
                        th:selected="${s == selectedServer}">
                </option>
            </select>
            <span th:if="${serverNames == null or serverNames.isEmpty()}"
                  class="text-secondary small fst-italic"
                  th:text="#{header.noServers}">No servers configured</span>
        </form>

        <!-- Right: nav links -->
        <div class="d-flex gap-2">
            <a th:if="${backUrl != null}" th:href="${backUrl}"
               class="btn btn-sm btn-outline-light" th:title="#{nav.back}"><i class="bi bi-arrow-left"></i></a>
            <button class="btn btn-sm btn-outline-light" id="themeToggle"
                    th:title="#{label.themeToggle}" onclick="toggleTheme()">
                <i class="bi bi-moon-stars" id="themeIcon"></i>
            </button>
            <a class="btn btn-sm btn-outline-light" href="/cart"
               th:title="#{nav.cart}"><i class="bi bi-cart3"></i></a>
            <a class="btn btn-sm btn-outline-light" href="/config"
               onclick="if(typeof saveFormState==='function') saveFormState()"
               th:title="#{nav.servers}"><i class="bi bi-server"></i></a>
            <a class="btn btn-sm btn-outline-light" href="/settings"
               onclick="if(typeof saveFormState==='function') saveFormState()"
               th:title="#{nav.config}"><i class="bi bi-gear"></i></a>
            <a class="btn btn-sm btn-outline-light" href="/help"
               onclick="if(typeof saveFormState==='function') saveFormState()"
               th:title="#{nav.help}"><i class="bi bi-question-circle"></i></a>
        </div>
    </div>
</nav>

<!-- Footer fragment -->
<footer th:fragment="footer" class="bg-dark text-secondary mt-4 py-2 border-top border-secondary">
    <div class="container-fluid px-4 d-flex justify-content-between align-items-center"
         style="font-size:0.75rem;">
        <a href="https://github.com/uwegeercken/bucketeer" target="_blank" rel="noopener"
           class="text-secondary text-decoration-none" th:text="#{footer.github}">Github</a>
        <span>
            <span th:text="#{footer.version}">Version</span>
            <span th:text="${appVersion}"></span>
            &nbsp;|&nbsp;
            <span th:text="#{footer.released}">Released</span>
            <span th:text="${appReleaseDate}"></span>
        </span>
    </div>
</footer>

</html>
