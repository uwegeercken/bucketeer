<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${isNew} ? #{config.form.titleNew} : #{config.form.titleEdit}">Server</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <style>
        body { background-color:#f0f2f5; font-size:0.875rem; display:flex; flex-direction:column; min-height:100vh; }
        main { flex:1; }
        .panel { background:#fff; border:1px solid #dee2e6; border-radius:0.5rem; padding:1.25rem; }
        .panel-title { font-size:0.7rem; font-weight:600; text-transform:uppercase; letter-spacing:0.05em; color:#6c757d; margin-bottom:0.75rem; }
    </style>
</head>
<body>

<nav th:replace="~{layout :: header}"></nav>

<main class="container px-4" style="max-width:640px;">
    <div class="panel">
        <div class="panel-title"
             th:text="${isNew} ? #{config.form.titleNew} : #{config.form.titleEdit}">Server</div>

        <form method="post" action="/config/server/save">
            <div class="mb-3">
                <label class="form-label fw-semibold" th:text="#{config.col.name}">Name</label>
                <input type="text" name="name" class="form-control form-control-sm"
                       th:value="${server.name()}" th:readonly="${!isNew}" required/>
                <div class="form-text" th:if="${!isNew}" th:text="#{config.form.nameReadonly}"></div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold" th:text="#{config.col.endpoint}">Endpoint</label>
                <input type="text" name="endpoint" class="form-control form-control-sm font-monospace"
                       th:value="${server.endpoint()}" placeholder="http://localhost:9000" required/>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold" th:text="#{config.col.region}">Region</label>
                <input type="text" name="region" class="form-control form-control-sm"
                       th:value="${server.region()}" placeholder="us-east-1" required/>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold" th:text="#{config.col.accessKey}">Access Key</label>
                <input type="password" name="accessKey" class="form-control form-control-sm font-monospace"
                       th:value="${server.accessKey()}" autocomplete="off" required/>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold" th:text="#{config.col.secretKey}">Secret Key</label>
                <input type="password" name="secretKey" class="form-control form-control-sm font-monospace"
                       th:value="${server.secretKey()}" autocomplete="off" required/>
            </div>
            <div class="mb-4">
                <div class="form-check">
                    <input type="checkbox" class="form-check-input" name="verifyCertificate"
                           id="verifyCertificate" value="true"
                           th:checked="${server.verifyCertificate()}"/>
                    <label class="form-check-label fw-semibold" for="verifyCertificate"
                           th:text="#{config.col.verifyCert}">Verify Certificate</label>
                </div>
                <div class="form-text" th:text="#{config.form.verifyCertHint}">
                    Uncheck for HTTPS servers without a valid certificate (e.g. StorageGRID without cert).
                </div>
            </div>

            <div class="d-flex gap-2 mt-4">
                <button type="submit" name="test" value="false"
                        class="btn btn-sm btn-primary" th:text="#{config.action.save}">Save</button>
                <button type="submit" name="test" value="true"
                        class="btn btn-sm btn-outline-primary"
                        th:text="#{config.action.saveAndTest}">Save &amp; Test</button>
                <a href="/config" class="btn btn-sm btn-outline-secondary"
                   th:text="#{config.action.cancel}">Cancel</a>
            </div>
        </form>
    </div>
</main>

<footer th:replace="~{layout :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
