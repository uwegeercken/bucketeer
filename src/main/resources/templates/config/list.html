<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="#{config.title}">Bucketeer – Configuration</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <style>
        body { background-color: #f0f2f5; font-size: 0.875rem; }
        .panel { background:#fff; border:1px solid #dee2e6; border-radius:0.5rem; padding:1.25rem; }
        .panel-title { font-size:0.7rem; font-weight:600; text-transform:uppercase; letter-spacing:0.05em; color:#6c757d; margin-bottom:0.75rem; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-3">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/" th:text="#{app.title}">Bucketeer</a>
        <a class="btn btn-sm btn-outline-light" href="/" th:text="#{help.backToSearch}">← Search</a>
    </div>
</nav>

<div class="container-fluid px-4">

    <!-- Alerts -->
    <div th:if="${saved}" class="alert alert-success alert-dismissible fade show py-2">
        Server '<span th:text="${saved}"></span>' saved.
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${deleted}" class="alert alert-warning alert-dismissible fade show py-2">
        Server '<span th:text="${deleted}"></span>' deleted.
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${testSuccess}" class="alert alert-success alert-dismissible fade show py-2">
        Connection test for '<span th:text="${testSuccess}"></span>' succeeded.
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${testError}" class="alert alert-danger alert-dismissible fade show py-2">
        Connection test for '<span th:text="${testName}"></span>' failed: <span th:text="${testError}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="panel">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div class="panel-title mb-0" th:text="#{config.servers}">S3 Servers</div>
            <a href="/config/server/new" class="btn btn-sm btn-primary" th:text="#{config.addServer}">+ Add Server</a>
        </div>

        <div th:if="${servers.isEmpty()}" class="text-muted small" th:text="#{config.noServers}">
            No servers configured yet.
        </div>

        <table th:if="${!servers.isEmpty()}" class="table table-sm table-hover table-bordered mb-0">
            <thead class="table-secondary">
            <tr>
                <th th:text="#{config.col.name}">Name</th>
                <th th:text="#{config.col.endpoint}">Endpoint</th>
                <th th:text="#{config.col.region}">Region</th>
                <th style="width:200px"></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="server : ${servers}">
                <td th:text="${server.name()}" class="fw-semibold"></td>
                <td th:text="${server.endpoint()}" class="font-monospace small"></td>
                <td th:text="${server.region()}"></td>
                <td>
                    <div class="d-flex gap-1">
                        <a th:href="@{/config/server/{name}/edit(name=${server.name()})}"
                           class="btn btn-sm btn-outline-secondary"
                           th:text="#{config.action.edit}">Edit</a>

                        <form th:action="@{/config/server/{name}/delete(name=${server.name()})}"
                              method="post" class="d-inline"
                              onsubmit="return confirm('Delete this server?')">
                            <button type="submit" class="btn btn-sm btn-outline-danger"
                                    th:text="#{config.action.delete}">Delete</button>
                        </form>

                        <form th:action="@{/config/server/{name}/edit(name=${server.name()})}"
                              method="get" class="d-inline">
                            <button type="submit" name="test" value="true"
                                    class="btn btn-sm btn-outline-primary"
                                    th:text="#{config.action.test}">Test</button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
