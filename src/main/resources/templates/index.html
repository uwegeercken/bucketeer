<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="#{app.title}">Bucketeer</title>
    <th:block th:replace="~{layout :: styles}"></th:block>
</head>
<body>

<nav th:replace="~{layout :: header}"></nav>

<main class="container-fluid px-4">

    <!-- Error -->
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show py-2" role="alert">
        <strong>Fehler:</strong> <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Favorites -->
    <div class="panel" id="favoritesPanel">
        <div class="panel-title" th:text="#{nav.favorites}">Favorites</div>
        <div class="d-flex align-items-center flex-wrap gap-2">
            <div id="favoritePills" class="d-flex flex-wrap gap-1 flex-grow-1"></div>
            <div class="d-flex align-items-center gap-1 ms-auto flex-shrink-0">
                <input type="text" id="favoriteName" class="form-control form-control-sm"
                       style="width:150px" th:placeholder="#{placeholder.favoriteName}"/>
                <button class="btn btn-sm btn-outline-secondary btn-icon" onclick="addFavorite()"
                        th:title="#{btn.addFavorite}"><i class="bi bi-bookmark-plus"></i></button>
            </div>
        </div>
    </div>

    <!-- Search -->
    <div class="panel" id="searchPanel">
        <div class="panel-title" th:text="#{nav.search}">Search</div>
        <form method="get" action="/" id="searchForm">
            <input type="hidden" name="search" value="true"/>
            <div class="row g-2 align-items-end">
                <div class="col-md-3">
                    <label class="form-label small fw-semibold" th:text="#{label.bucket}">Bucket</label>
                    <select name="bucket" id="bucketInput"
                            class="form-select form-select-sm font-monospace">
                        <option value="">--</option>
                    </select>
                </div>
                <div class="col-md-5">
                    <label class="form-label small fw-semibold">
                        <span th:text="#{label.prefix}">Prefix</span>
                        <i class="bi bi-code-slash text-muted small ms-1"
                           role="img" id="functionsIcon"
                           th:attr="data-bs-content=${tooltipText}"
                           data-bs-toggle="popover" data-bs-trigger="hover"
                           data-bs-placement="right" data-bs-html="true"></i>
                        <i class="bi bi-info-circle text-muted small ms-1"
                           role="img" id="resolvedIcon"
                           data-bs-toggle="popover" data-bs-trigger="hover"
                           data-bs-placement="right" data-bs-html="true"
                           data-bs-content=" "></i>
                    </label>
                    <input type="text" name="prefix" id="prefixInput"
                           class="form-control form-control-sm font-monospace"
                           th:value="${prefix}" oninput="updateResolvedPrefix()"/>
                    <div id="prefixError" class="text-danger small mt-1" style="display:none;"></div>
                </div>
                <div class="col-md-2">
                    <label class="form-label small fw-semibold" th:text="#{label.key}">Key</label>
                    <input type="text" name="key" id="keyInput"
                           class="form-control form-control-sm font-monospace"
                           th:value="${key}" oninput="updateResolvedPrefix()"/>
                </div>
                <div class="col-auto">
                    <label class="form-label small fw-semibold invisible">&nbsp;</label>
                    <button type="submit" id="searchBtn" class="btn btn-sm btn-outline-secondary btn-icon"
                            th:title="#{label.search}" th:aria-label="#{label.search}">
                        <i class="bi bi-search"></i>
                    </button>
                </div>
            </div>
        </form>
    </div>

    <!-- Results -->
    <div class="panel" id="resultsPanel" th:if="${queryStarted}">
        <div class="panel-title d-flex align-items-center justify-content-between">
            <span th:text="#{nav.results}">Results</span>
            <div class="d-flex gap-1">
                <button type="button" id="btnExport" class="btn btn-sm btn-outline-secondary btn-icon"
                        onclick="exportParquet()" title="Export Parquet" disabled>
                    <i class="bi bi-file-earmark-arrow-down"></i>
                </button>
                <button type="button" id="toggleMaximize" class="btn btn-sm btn-outline-secondary btn-icon"
                        onclick="toggleMaximize()" title="Maximize / Restore">
                    <i class="bi bi-arrows-fullscreen"></i>
                </button>
            </div>
        </div>

        <!-- Progress -->
        <div id="queryProgress" class="mb-2">
            <div class="d-flex align-items-center gap-2">
                <div class="spinner-border spinner-border-sm text-primary" id="querySpinner"></div>
                <span class="text-muted small" id="queryStatusText" th:text="#{msg.queryRunning}">Loading...</span>
            </div>
        </div>

        <!-- Filter form -->
        <div id="filterForm" class="mb-3" style="display:none;">
            <div class="row g-2 align-items-end">
                <div class="col-md-4">
                    <label class="form-label small fw-semibold" th:text="#{label.filterKey}">Name contains</label>
                    <input type="text" id="filterKey" class="form-control form-control-sm font-monospace"
                           oninput="applyFilter()"/>
                </div>
                <div class="col-md-2">
                    <label class="form-label small fw-semibold" th:text="#{label.filterSizeMin}">Size min (KB)</label>
                    <input type="number" id="filterSizeMin" class="form-control form-control-sm"
                           min="0" oninput="applyFilter()"/>
                </div>
                <div class="col-md-2">
                    <label class="form-label small fw-semibold" th:text="#{label.filterSizeMax}">Size max (KB)</label>
                    <input type="number" id="filterSizeMax" class="form-control form-control-sm"
                           min="0" oninput="applyFilter()"/>
                </div>
                <div class="col-md-2">
                    <label class="form-label small fw-semibold" th:text="#{label.filterDateFrom}">Date from</label>
                    <input type="date" id="filterDateFrom" class="form-control form-control-sm"
                           onchange="applyFilter()"/>
                </div>
                <div class="col-md-2">
                    <label class="form-label small fw-semibold" th:text="#{label.filterDateTo}">Date to</label>
                    <input type="date" id="filterDateTo" class="form-control form-control-sm"
                           onchange="applyFilter()"/>
                </div>
            </div>
        </div>

        <!-- Result count -->
        <div id="resultCount" style="display:none;" class="mb-2">
            <span class="text-muted small" id="resultCountText"></span>
        </div>

        <!-- Pagination top -->
        <div id="paginationTop" style="display:none;" class="d-flex align-items-center gap-1 mb-2"></div>

        <!-- Results table -->
        <table id="resultsTable" style="display:none;"
               class="table table-sm table-hover table-bordered mb-2 results-table">
            <thead class="table-secondary">
            <tr>
                <th th:text="#{label.objectName}">Name</th>
                <th class="text-end" style="width:110px" th:text="#{label.size}">Size (KB)</th>
                <th style="width:210px" th:text="#{label.lastModified}">Last Modified</th>
                <th style="width:52px"></th>
            </tr>
            </thead>
            <tbody id="resultsBody"></tbody>
        </table>

        <!-- Pagination bottom -->
        <div id="paginationBottom" style="display:none;" class="d-flex align-items-center gap-1"></div>
    </div>

</main>

<footer th:replace="~{layout :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    const currentServer  = /*[[${selectedServer}]]*/ '';
    const currentBucket  = /*[[${bucket}]]*/ '';
    const queryStarted   = /*[[${queryStarted}]]*/ false;
    const labelDownload  = /*[[#{label.download}]]*/ 'Download';
    const labelNoFav     = /*[[#{msg.noFavorites}]]*/ 'No favorites yet.';
    const labelObjFound  = /*[[#{msg.objectsFound}]]*/ 'objects found...';
    const labelObjTotal  = /*[[#{msg.objectsTotal}]]*/ 'objects loaded.';
    const labelNoObj     = /*[[#{msg.noObjects}]]*/ 'No objects found.';
    const labelQryErr    = /*[[#{msg.queryError}]]*/ 'Error:';
    const labelObjMatch  = /*[[#{msg.objectsMatching}]]*/ 'objects matching filter';
    const labelPage      = /*[[#{msg.page}]]*/ 'page';
    const labelPrev      = /*[[#{btn.prev}]]*/ '\u2190 Previous';
    const labelNext      = /*[[#{btn.next}]]*/ 'Next \u2192';

    const STORAGE_KEY = 'bucketeer_favorites';

    // --- Bucket dropdown ---

    async function loadBuckets(selectPreselected) {
        const select = document.getElementById('bucketInput');
        try {
            const res = await fetch('/api/buckets');
            const buckets = await res.json();
            const current = selectPreselected || '';
            select.innerHTML = '<option value="">--</option>'
                + buckets.map(b => '<option value="' + escHtml(b) + '"'
                    + (b === current ? ' selected' : '') + '>'
                    + escHtml(b) + '</option>').join('');
        } catch {
            select.innerHTML = '<option value="">--</option>';
        }
    }

    // --- Prefix validation ---

    function setResolvedPopover(text) {
        const el = document.getElementById('resolvedIcon');
        const existing = bootstrap.Popover.getInstance(el);
        if (existing) existing.dispose();
        new bootstrap.Popover(el, {
            trigger: 'hover',
            placement: 'right',
            html: true,
            content: text || '\u2013'
        });
    }

    function updateResolvedPrefix() {
        const prefix    = document.getElementById('prefixInput').value;
        const key       = document.getElementById('keyInput').value;
        const errorEl   = document.getElementById('prefixError');
        const prefixEl  = document.getElementById('prefixInput');
        const searchBtn = document.getElementById('searchBtn');
        if (!prefix) {
            setResolvedPopover('');
            errorEl.style.display = 'none';
            prefixEl.classList.remove('is-invalid', 'is-valid');
            searchBtn.disabled = false;
            return;
        }
        fetch('/api/validate-prefix?prefix=' + encodeURIComponent(prefix))
            .then(r => r.json())
            .then(result => {
                if (result.valid) {
                    errorEl.style.display = 'none';
                    prefixEl.classList.remove('is-invalid');
                    prefixEl.classList.add('is-valid');
                    searchBtn.disabled = false;
                    fetch('/api/resolve-prefix?prefix=' + encodeURIComponent(prefix) + '&key=' + encodeURIComponent(key))
                        .then(r => r.text())
                        .then(resolved => { setResolvedPopover(resolved); })
                        .catch(() => {});
                } else {
                    errorEl.textContent = result.error;
                    errorEl.style.display = 'block';
                    prefixEl.classList.add('is-invalid');
                    prefixEl.classList.remove('is-valid');
                    searchBtn.disabled = true;
                    setResolvedPopover('');
                }
            }).catch(() => {});
    }

    // --- Favorites ---

    function loadFavorites() {
        try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { return []; }
    }
    function saveFavorites(list) { localStorage.setItem(STORAGE_KEY, JSON.stringify(list)); }

    function addFavorite() {
        const name = document.getElementById('favoriteName').value.trim();
        if (!name) return;
        const fav = { name, server: currentServer || '',
            bucket: document.getElementById('bucketInput').value,
            prefix: document.getElementById('prefixInput').value,
            key:    document.getElementById('keyInput').value };
        const list = loadFavorites();
        const idx  = list.findIndex(f => f.name === name);
        if (idx >= 0) list[idx] = fav; else list.push(fav);
        saveFavorites(list);
        document.getElementById('favoriteName').value = '';
        renderFavorites();
    }

    function applyFavorite(name) {
        const fav = loadFavorites().find(f => f.name === name);
        if (!fav) return;
        const serverSelect = document.querySelector('select[name="serverName"]');
        const knownServers = serverSelect ? Array.from(serverSelect.options).map(o => o.value) : [];
        if (fav.server && fav.server !== currentServer && knownServers.includes(fav.server)) {
            const form = document.createElement('form');
            form.method = 'POST'; form.action = '/session/server';
            const inp = document.createElement('input');
            inp.type = 'hidden'; inp.name = 'serverName'; inp.value = fav.server;
            form.appendChild(inp); document.body.appendChild(form); form.submit();
            return;
        }
        document.getElementById('bucketInput').value = fav.bucket || '';
        if (fav.bucket && !document.getElementById('bucketInput').querySelector('option[value="' + CSS.escape(fav.bucket) + '"]')) {
            const opt = document.createElement('option');
            opt.value = fav.bucket; opt.textContent = fav.bucket; opt.selected = true;
            document.getElementById('bucketInput').appendChild(opt);
        } else {
            document.getElementById('bucketInput').value = fav.bucket || '';
        }
        document.getElementById('prefixInput').value = fav.prefix || '';
        document.getElementById('keyInput').value    = fav.key    || '';
        updateResolvedPrefix();
    }

    function deleteFavorite(name) {
        saveFavorites(loadFavorites().filter(f => f.name !== name));
        renderFavorites();
    }

    function renderFavorites() {
        const list      = loadFavorites();
        const container = document.getElementById('favoritePills');
        if (list.length === 0) {
            container.innerHTML = '<span class="text-muted small fst-italic">' + escHtml(labelNoFav) + '</span>';
            return;
        }
        container.innerHTML = list.map(fav => {
            const safeName  = escHtml(fav.name);
            const safeTitle = escHtml((fav.server||'') + ' / ' + (fav.bucket||'') + ' / ' + (fav.prefix||''));
            const safeKey   = escHtml(fav.name);
            return '<span class="fav-pill" title="' + safeTitle + '" style="display:inline-flex;background:#e9ecef;border:1px solid #adb5bd;border-radius:1rem;padding:0.2rem 0.6rem;color:#495057;font-size:0.78rem;cursor:pointer;align-items:center;gap:0.35rem;white-space:nowrap;">'
                + '<span class="fav-apply" data-fav="' + safeKey + '">' + safeName + '</span>'
                + '<span class="del fav-delete" data-fav="' + safeKey + '" style="color:#adb5bd;font-size:0.9rem;line-height:1;">&times;</span>'
                + '</span>';
        }).join('');
    }

    function escHtml(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function saveFormState() {
        sessionStorage.setItem('bkt_bucket', document.getElementById('bucketInput').value);
        sessionStorage.setItem('bkt_prefix', document.getElementById('prefixInput').value);
        sessionStorage.setItem('bkt_key',    document.getElementById('keyInput').value);
    }

    function restoreFormState() {
        const bucket = sessionStorage.getItem('bkt_bucket');
        const prefix = sessionStorage.getItem('bkt_prefix');
        const key    = sessionStorage.getItem('bkt_key');
        if (bucket) {
            const sel = document.getElementById('bucketInput');
            if (sel.querySelector('option[value="' + CSS.escape(bucket) + '"]')) {
                sel.value = bucket;
            } else if (bucket && sel.options.length > 0) {
                const opt = document.createElement('option');
                opt.value = bucket; opt.textContent = bucket; opt.selected = true;
                sel.appendChild(opt);
            }
        }
        if (prefix && !document.getElementById('prefixInput').value)
            document.getElementById('prefixInput').value = prefix;
        if (key && !document.getElementById('keyInput').value)
            document.getElementById('keyInput').value = key;
    }

    // --- Query polling ---

    let currentPage  = 0;
    const SETTINGS_KEY = 'bucketeer_settings';
    const PAGE_SIZE  = (() => {
        try {
            const s = JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{}');
            return s.pageSize && s.pageSize >= 10 && s.pageSize <= 1000 ? s.pageSize : 100;
        } catch { return 100; }
    })();
    let pollInterval = null;

    function startPolling() {
        if (!queryStarted) return;
        pollInterval = setInterval(async () => {
            try {
                const res  = await fetch('/api/query/status');
                const data = await res.json();
                const statusText = document.getElementById('queryStatusText');
                if (data.status === 'RUNNING') {
                    statusText.textContent = data.objectsFound + ' ' + labelObjFound;
                } else if (data.status === 'DONE') {
                    clearInterval(pollInterval);
                    document.getElementById('querySpinner').style.display = 'none';
                    if (data.objectsFound === 0) {
                        statusText.textContent = labelNoObj;
                    } else {
                        statusText.textContent = data.objectsFound + ' ' + labelObjTotal;
                        document.getElementById('filterForm').style.display = 'block';
                        loadResults();
                    }
                } else if (data.status === 'ERROR') {
                    clearInterval(pollInterval);
                    document.getElementById('querySpinner').style.display = 'none';
                    statusText.classList.add('text-danger');
                    statusText.textContent = labelQryErr + ' ' + data.error;
                }
            } catch (e) { /* ignore */ }
        }, 500);
    }

    async function loadResults() {
        const params = new URLSearchParams({ page: currentPage, pageSize: PAGE_SIZE });
        const keyFilter = document.getElementById('filterKey')?.value    || '';
        const minSizeKb = document.getElementById('filterSizeMin')?.value || '';
        const maxSizeKb = document.getElementById('filterSizeMax')?.value || '';
        const dateFrom  = document.getElementById('filterDateFrom')?.value || '';
        const dateTo    = document.getElementById('filterDateTo')?.value   || '';
        if (keyFilter)  params.append('keyFilter',  keyFilter);
        if (minSizeKb)  params.append('minSizeKb',  minSizeKb);
        if (maxSizeKb)  params.append('maxSizeKb',  maxSizeKb);
        if (dateFrom)   params.append('dateFrom',   dateFrom);
        if (dateTo)     params.append('dateTo',     dateTo);

        const res  = await fetch('/api/query/results?' + params.toString());
        const data = await res.json();

        const tbody = document.getElementById('resultsBody');
        tbody.innerHTML = data.rows.map(row =>
            '<tr>'
            + '<td class="text-break font-monospace small">' + escHtml(row.key) + '</td>'
            + '<td class="text-end small">' + escHtml(row.sizeKb) + '</td>'
            + '<td class="small">' + escHtml(row.lastModified) + '</td>'
            + '<td><a href="/download?bucket=' + encodeURIComponent(currentBucket) + '&key=' + encodeURIComponent(row.key) + '" class="btn btn-sm btn-outline-secondary btn-icon" title="' + escHtml(labelDownload) + '" aria-label="' + escHtml(labelDownload) + '"><i class="bi bi-download" aria-hidden="true"></i></a></td>'
            + '</tr>'
        ).join('');

        document.getElementById('resultsTable').style.display = data.rows.length > 0 ? '' : 'none';

        const totalPages = Math.ceil(data.total / PAGE_SIZE);
        const countEl = document.getElementById('resultCount');
        countEl.style.display = 'flex';
        const pageInfo = totalPages > 1 ? ' \u2013 ' + (currentPage + 1) + ' / ' + totalPages : '';
        document.getElementById('resultCountText').textContent = data.total + ' ' + labelObjMatch + pageInfo;
        document.getElementById('btnExport').disabled = data.total === 0;

        renderPagination('paginationTop',    data.total, totalPages);
        renderPagination('paginationBottom', data.total, totalPages);
    }

    function renderPagination(elementId, total, totalPages) {
        const pag = document.getElementById(elementId);
        if (total <= PAGE_SIZE) { pag.style.display = 'none'; return; }
        pag.style.display = 'flex';
        pag.innerHTML = '';

        const btn = (label, disabled, onclick) => {
            const b = document.createElement('button');
            b.className = 'btn btn-sm btn-outline-primary';
            b.textContent = label;
            b.disabled = disabled;
            if (!disabled) b.onclick = onclick;
            return b;
        };

        pag.appendChild(btn('\u00ab\u00ab', currentPage === 0,
            () => { currentPage = 0; loadResults(); }));
        pag.appendChild(btn('\u2039', currentPage === 0,
            () => { currentPage--; loadResults(); }));

        const info = document.createElement('span');
        info.className = 'text-muted small px-2';
        info.textContent = (currentPage + 1) + ' / ' + totalPages;
        pag.appendChild(info);

        pag.appendChild(btn('\u203a', currentPage >= totalPages - 1,
            () => { currentPage++; loadResults(); }));
        pag.appendChild(btn('\u00bb\u00bb', currentPage >= totalPages - 1,
            () => { currentPage = totalPages - 1; loadResults(); }));
    }

    function exportParquet() {
        const params = new URLSearchParams();
        const keyFilter = document.getElementById('filterKey')?.value    || '';
        const minSizeKb = document.getElementById('filterSizeMin')?.value || '';
        const maxSizeKb = document.getElementById('filterSizeMax')?.value || '';
        const dateFrom  = document.getElementById('filterDateFrom')?.value || '';
        const dateTo    = document.getElementById('filterDateTo')?.value   || '';
        if (keyFilter)     params.append('keyFilter',  keyFilter);
        if (minSizeKb)     params.append('minSizeKb',  minSizeKb);
        if (maxSizeKb)     params.append('maxSizeKb',  maxSizeKb);
        if (dateFrom)      params.append('dateFrom',   dateFrom);
        if (dateTo)        params.append('dateTo',     dateTo);
        if (currentBucket) params.append('bucket',     currentBucket);
        window.location.href = '/api/query/export?' + params.toString();
    }

    let maximized = false;
    function toggleMaximize() {
        maximized = !maximized;
        const fav    = document.getElementById('favoritesPanel');
        const search = document.getElementById('searchPanel');
        const icon   = document.querySelector('#toggleMaximize i');
        if (maximized) {
            fav.style.display = 'none';
            search.style.display = 'none';
            icon.className = 'bi bi-fullscreen-exit';
        } else {
            fav.style.display = '';
            search.style.display = '';
            icon.className = 'bi bi-arrows-fullscreen';
        }
    }

    let filterTimer = null;
    function applyFilter() {
        currentPage = 0;
        clearTimeout(filterTimer);
        filterTimer = setTimeout(loadResults, 300);
    }

    document.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('[data-bs-toggle="popover"]').forEach(el => {
            new bootstrap.Popover(el);
        });
        setResolvedPopover('');

        loadBuckets(currentBucket).then(() => {
            restoreFormState();
            renderFavorites();
            updateResolvedPrefix();
            startPolling();
        });

        document.getElementById('favoritePills').addEventListener('click', e => {
            const applyEl  = e.target.closest('.fav-apply');
            const deleteEl = e.target.closest('.fav-delete');
            if (applyEl)  applyFavorite(applyEl.dataset.fav);
            if (deleteEl) deleteFavorite(deleteEl.dataset.fav);
        });
    });
</script>
</body>
</html>
