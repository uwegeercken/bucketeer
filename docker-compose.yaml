services:
  bucketeer:
    build: .
    container_name: bucketeer
    ports:
      - "8080:8080"
    volumes:
      - bucketeer-data:/root/.bucketeer
    depends_on:
      - minio

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin123
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data

volumes:
  bucketeer-data:
  minio-data:
